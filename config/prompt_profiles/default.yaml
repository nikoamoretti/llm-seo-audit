  trust:
    - template: "Which {industry} business in {city} is the most trusted?"
  price:
    - template: "What should I expect to pay for {industry} in {service_area}?"
  symptom_problem:
    - template: "Who can help with a common {industry} problem in {service_area}?"
  follow_up:
    - template: "If my first choice for {industry} in {service_area} is unavailable, who is the next best option?"
