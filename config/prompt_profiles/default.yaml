display_name: Default
aliases: []
clusters:
  branded:
    - template: "Tell me about {business_name}. What do they do and are they reputable?"
    - template: "What do people say about {business_name}? Would you recommend them?"
    - template: "Have you heard of {business_name}? What's their reputation in the {industry} space?"
  discovery:
    - template: "Who are the top companies in {industry}?"
    - template: "I'm looking for the best {industry} companies. Who should I consider?"
    - template: "What companies are leading the {industry} space right now?"
  comparison:
    - template: "Who are {business_name}'s main competitors?"
    - template: "Compare {business_name} to their top competitors in {industry}."
    - template: "If I'm evaluating {business_name}, who else should I look at?"
  urgency:
    - template: "I need a {industry} partner quickly. Who are the top options?"
  trust:
    - template: "Which {industry} companies are the most trusted and established?"
    - template: "Who has the best track record in {industry}?"
  price:
    - template: "What should I expect to pay for {industry} services?"
  symptom_problem:
    - template: "What companies can help if I need better results from my {industry} strategy?"
  follow_up:
    - template: "Besides {business_name}, who else is strong in {industry}?"
