name: ci

'on':
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy
      - name: Benchmark regression
        run: |
          python - <<'PY'
          from pprint import pprint
          from src.ops.benchmark_runner import run_benchmarks

          result = run_benchmarks()
          pprint(result["summary"])
          assert result["summary"]["flagged_count"] == 0
          PY
      - name: Pytest
        run: pytest

  canary:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run canary snapshot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from pprint import pprint
          from src.ops.canary_runner import run_canary_check

          if not os.environ.get("OPENAI_API_KEY"):
              print("Skipping canary: OPENAI_API_KEY not configured.")
          else:
              result = run_canary_check(
                  provider="openai",
                  api_keys={"openai": os.environ["OPENAI_API_KEY"]},
                  snapshot_path=Path("artifacts/canary/current.json"),
                  canary_prompts_path=Path("config/canary_prompts.yaml"),
              )
              pprint(result)
          PY
      - name: Upload canary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-snapshot
          path: artifacts/canary/
          if-no-files-found: ignore
